{% extends "base.html" %}

{% block title %}Users List{% endblock %}

{% block content %}
<h1>Users List</h1>

{% if users %}
<table>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Actions</th>
    </tr>
    {% for user in users %}
    <tr>
        <td>{{ user[0] }}</td>
        <td>{{ user[1] }}</td>
        <td>{{ user[2] }}</td>
        <td>
            <a class="edit-link" href="{{ url_for('edit_user', user_id=user[0]) }}">Edit</a>

            <form class="action-form" method="POST" action="{{ url_for('delete_user', user_id=user[0]) }}">
                <button class="delete-btn" type="submit">Delete</button>
            </form>
        </td>
    </tr>
    {% endfor %}
</table>
{% else %}
<p>No users found.</p>
{% endif %}
{% endblock %}
